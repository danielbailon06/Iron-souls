<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Souls</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.ico">

</head>

<body data-scene="scene2">

    <div id="hud">
        <div id="hp-wrap">
            <div id="hp-bar"></div>
        </div>
    </div>

    <div class="second-scene">
        <img src="img/assets/character/character-idle.png" id="character">
        <img src="img/assets/enemies/eskeleto.png" class="enemy" data-x="46" data-y="50">
        <img src="img/assets/enemies/eskeleto.png" class="enemy" data-x="52" data-y="50">
        <img src="img/assets/enemies/eskeleto.png" class="enemy" data-x="49" data-y="65">
        <img src="img/assets/enemies/eskeleto.png" class="enemy" data-x="30" data-y="35">
        <img src="img/assets/enemies/eskeleto.png" class="enemy" data-x="33" data-y="30">
        <div id="fade-screen"></div>

        <!-- Hitboxes elementos del mapa -->
        <div class="wall" id="wall-left"></div>
        <div class="wall" id="wall-right"></div>
        <div class="wall" id="wall-bottom-left"></div>
        <div class="wall" id="wall-bottom-right"></div>

        <div class="wall" id="pillar1"></div>
        <div class="wall" id="pillar2"></div>
        <div class="wall" id="pillar3"></div>
        <div class="wall" id="pillar4"></div>

        <div class="wall" id="water1"></div>
        <div class="wall" id="water2"></div>

        <div class="trigger" id="scene-trigger"></div>
        <div id="death-screen">
            YOU DIED
        </div>
    </div>
    <script src="script/index.js"></script>

</html>
